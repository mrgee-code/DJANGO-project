{% extends 'base.html' %}
{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product - MyShop{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h2>{% if product %}Edit{% else %}Add{% endif %} Product</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select" required>
                {% for category in categories %}
                <option value="{{ category.id }}" {% if product.category_id == category.id %}selected{% endif %}>
                    {{ category.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ product.stock|default:'0' }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
