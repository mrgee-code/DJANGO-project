{% extends 'base.html' %}
{% block title %}Order {{ product.name }} - MyShop{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h2>Order: {{ product.name }}</h2>
    <p class="text-muted">${{ product.price }} each &mdash; {{ product.stock }} available</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" min="1" max="{{ product.stock }}" value="1" required>
        </div>
        <div class="mb-3">
            <label class="form-label">M-Pesa Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="2547XXXXXXXX" required>
        </div>
        <button type="submit" class="btn btn-success">Pay with M-Pesa</button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
